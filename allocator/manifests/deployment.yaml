apiVersion: apps/v1
kind: Deployment
metadata:
  name: allocator
  namespace: rcss-gateway-dev
  labels:
    app: allocator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: allocator
  template:
    metadata:
      labels:
        app: allocator
    spec:
      serviceAccountName: allocator-sa
      containers:
        - name: allocator
          image: allocator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6666
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT_HTTP
              value: "6666"
            - name: NAMESPACE
              value: "rcss-env-dev"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

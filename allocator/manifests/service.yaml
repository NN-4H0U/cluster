apiVersion: v1
kind: Service
metadata:
  name: allocator
  namespace: rcss-gateway
  labels:
    app: allocator
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: allocator
---

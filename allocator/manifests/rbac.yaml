apiVersion: v1
kind: ServiceAccount
metadata:
  name: allocator-sa
  namespace: rcss-gateway-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: allocator-role
rules:
  - apiGroups: ["allocation.agones.dev"]
    resources: ["gameserverallocations"]
    verbs: ["create"]
  - apiGroups: ["agones.dev"]
    resources: ["fleets"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: allocator-role
metadata:
  name: allocator-rolebinding
  namespace: rcss-env-dev
subjects:
  - kind: ServiceAccount
    name: allocator-sa
    namespace: rcss-gateway-dev
